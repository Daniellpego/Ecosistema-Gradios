name: Lighthouse CI

# Roda Lighthouse contra o preview da Vercel em todo PR pra main.
# Não precisa de URL hardcoded: wait-for-vercel-preview descobre via
# deployment_status events que a integração Vercel <> GitHub emite.
# Requer apenas GITHUB_TOKEN (nativo do Actions) — nenhum secret extra.

on:
  pull_request:
    branches: [main]

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Auditar preview com Lighthouse
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      deployments: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Aguardar preview da Vercel
        id: vercel
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
          check_interval: 15
          environment: Preview

      - name: Rodar Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ steps.vercel.outputs.url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1

      - name: Comentar scores no PR
        uses: actions/github-script@v7
        env:
          MANIFEST: ${{ steps.lighthouse.outputs.manifest }}
          LINKS: ${{ steps.lighthouse.outputs.links }}
          PREVIEW_URL: ${{ steps.vercel.outputs.url }}
        with:
          script: |
            const manifest = JSON.parse(process.env.MANIFEST);
            const links = JSON.parse(process.env.LINKS);
            const previewUrl = process.env.PREVIEW_URL;

            const run = manifest.find(r => r.isRepresentativeRun) || manifest[0];
            const s = run.summary;
            const score = (v) => Math.round(v * 100);
            const emoji = (v) => v >= 0.9 ? '🟢' : v >= 0.5 ? '🟠' : '🔴';
            const reportUrl = links[run.url];

            const marker = '<!-- lighthouse-ci-comment -->';
            const body = [
              marker,
              '## 🚦 Lighthouse — Preview Vercel',
              '',
              `**URL auditada:** ${previewUrl}`,
              '',
              '| Categoria | Score |',
              '|-----------|------:|',
              `| Performance    | ${emoji(s.performance)} **${score(s.performance)}** |`,
              `| Accessibility  | ${emoji(s.accessibility)} **${score(s.accessibility)}** |`,
              `| Best Practices | ${emoji(s['best-practices'])} **${score(s['best-practices'])}** |`,
              `| SEO            | ${emoji(s.seo)} **${score(s.seo)}** |`,
              '',
              `📄 [Relatório completo](${reportUrl})`,
              '',
              '<sub>Automatizado · `.github/workflows/lighthouse.yml` · Metas: Accessibility ≥ 90, SEO ≥ 95</sub>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => (c.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
