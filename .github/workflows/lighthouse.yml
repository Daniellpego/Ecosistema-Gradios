name: Lighthouse CI

# Auditoria Lighthouse no preview Vercel do site em todo PR pra main.
#
# Monorepo: o repo tem 4 projetos Vercel (site-principal, painel-cfo,
# painel-crm, painel-cto). Este workflow audita APENAS site-principal.
#
# Estratégia: em vez de confiar em `wait-for-vercel-preview` (que pega o
# primeiro deployment_status e não distingue projetos), parseamos o
# comentário que o vercel[bot] posta no PR — ele tem uma linha por projeto
# com status e URL, então extraímos determinísticamente a URL de
# site-principal quando estiver "Ready".

on:
  pull_request:
    branches: [main]
    # Só roda quando o site (ou o próprio workflow) muda — evita gastar
    # minutes auditando PRs de painel-*.
    paths:
      - 'apps/site/**'
      - '.github/workflows/lighthouse.yml'

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Auditar preview com Lighthouse
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolver URL do preview site-principal
        id: vercel
        uses: actions/github-script@v7
        with:
          script: |
            const project = 'site-principal';
            const timeoutMs = 10 * 60 * 1000;
            const intervalMs = 15 * 1000;
            const deadline = Date.now() + timeoutMs;

            const findRow = (body) => body.split('\n').find(l =>
              l.includes(`[${project}]`) && l.includes('[Preview](')
            );
            const extractUrl = (row) => {
              const m = row.match(/\[Preview\]\((https:\/\/[^\s)]+)\)/);
              return m ? m[1] : null;
            };

            while (Date.now() < deadline) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });
              const vercelComment = comments.find(c => c.user?.login === 'vercel[bot]');
              if (vercelComment?.body) {
                const row = findRow(vercelComment.body);
                if (row && row.includes('[Ready](')) {
                  const url = extractUrl(row);
                  if (url) {
                    core.setOutput('url', url);
                    core.info(`✔ ${project} Ready → ${url}`);
                    return;
                  }
                }
                core.info(`… ${project} ainda não está Ready — aguardando ${intervalMs/1000}s`);
              } else {
                core.info(`… comentário do vercel[bot] ainda não postado — aguardando ${intervalMs/1000}s`);
              }
              await new Promise(r => setTimeout(r, intervalMs));
            }
            core.setFailed(`Timeout (${timeoutMs/1000}s) aguardando preview Ready de ${project}.`);

      - name: Rodar Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ steps.vercel.outputs.url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1

      - name: Comentar scores no PR
        if: always() && steps.lighthouse.outcome == 'success'
        uses: actions/github-script@v7
        env:
          MANIFEST: ${{ steps.lighthouse.outputs.manifest }}
          LINKS: ${{ steps.lighthouse.outputs.links }}
          PREVIEW_URL: ${{ steps.vercel.outputs.url }}
        with:
          script: |
            const manifest = JSON.parse(process.env.MANIFEST);
            const links = JSON.parse(process.env.LINKS);
            const previewUrl = process.env.PREVIEW_URL;

            const run = manifest.find(r => r.isRepresentativeRun) || manifest[0];
            const s = run.summary;
            const score = (v) => Math.round(v * 100);
            const emoji = (v) => v >= 0.9 ? '🟢' : v >= 0.5 ? '🟠' : '🔴';
            const reportUrl = links[run.url];

            const marker = '<!-- lighthouse-ci-comment -->';
            const body = [
              marker,
              '## 🚦 Lighthouse — Preview Vercel (site-principal)',
              '',
              `**URL auditada:** ${previewUrl}`,
              '',
              '| Categoria | Score |',
              '|-----------|------:|',
              `| Performance    | ${emoji(s.performance)} **${score(s.performance)}** |`,
              `| Accessibility  | ${emoji(s.accessibility)} **${score(s.accessibility)}** |`,
              `| Best Practices | ${emoji(s['best-practices'])} **${score(s['best-practices'])}** |`,
              `| SEO            | ${emoji(s.seo)} **${score(s.seo)}** |`,
              '',
              `📄 [Relatório completo](${reportUrl})`,
              '',
              '<sub>Automatizado · `.github/workflows/lighthouse.yml` · Metas: Accessibility ≥ 90, SEO ≥ 95</sub>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => (c.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
