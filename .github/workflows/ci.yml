name: CI — TypeScript + Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck-and-test:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        app: [cfo, cto, crm, site]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: TypeScript check
        working-directory: apps/${{ matrix.app }}
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: apps/${{ matrix.app }}
        run: npx vitest run
