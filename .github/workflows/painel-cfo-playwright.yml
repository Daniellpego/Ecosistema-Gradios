name: CI — Painel CFO Playwright

# Status (2026-05-11 — atualizado):
# - apps/cfo/tests/ EXISTE com Playwright config + spec smoke (e2e/01-smoke.spec.js)
# - Specs 06-10 (concurrency/persistence/dashboard-sync/mixbug/logic-usability)
#   AINDA NÃO foram escritos — só 01-smoke roda neste workflow.
# - Trigger: workflow_dispatch (manual). Pra rodar em PR, mudar pra:
#     on:
#       pull_request:
#         branches: [main]
#         paths: ['apps/cfo/**']
# - Pra escrever specs faltantes, ver apps/cfo/tests/README.md

on:
  workflow_dispatch:
  # pull_request:
  #   branches: [main]
  #   paths: ['apps/cfo/**']

jobs:
  e2e-painel-cfo:
    name: E2E smoke (01)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate required secrets
        run: |
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "❌ Missing SUPABASE_URL or SUPABASE_ANON_KEY secrets." >&2
            echo "Configure em Settings > Secrets and variables > Actions." >&2
            exit 1
          fi

      - name: Install painel CFO dependencies
        working-directory: apps/cfo
        run: npm ci

      - name: Build painel CFO
        working-directory: apps/cfo
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Start painel CFO
        working-directory: apps/cfo
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PORT: 3000
        run: |
          npm run start &
          # Espera o servidor responder (até 30s)
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/login >/dev/null 2>&1; then
              echo "✅ Server up"
              break
            fi
            sleep 1
          done

      - name: Install Playwright test dependencies
        working-directory: apps/cfo/tests
        run: npm install

      - name: Install Playwright browsers
        working-directory: apps/cfo/tests
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E (smoke 01 only — 06-10 ainda não escritos)
        working-directory: apps/cfo/tests
        env:
          BASE_URL: http://localhost:3000
        run: npx playwright test --config=playwright.config.js e2e/01-smoke.spec.js

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: painel-cfo-playwright-report
          path: apps/cfo/tests/playwright-report
          if-no-files-found: ignore
          retention-days: 7
