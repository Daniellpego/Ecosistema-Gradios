name: CI — Painel CFO Playwright

on:
  pull_request:
    branches: [main]
    paths:
      - 'painel-cfo/**'
      - '.github/workflows/painel-cfo-playwright.yml'
  workflow_dispatch:

jobs:
  e2e-painel-cfo:
    name: E2E 06/07/08/09/10
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: painel-cfo/tests/package-lock.json

      - name: Validate required secrets
        run: |
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY secrets." >&2
            exit 1
          fi

      - name: Install test dependencies
        working-directory: painel-cfo/tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: painel-cfo/tests
        run: npx playwright install --with-deps

      - name: Run Playwright E2E suites
        working-directory: painel-cfo/tests
        run: |
          npx playwright test --config=playwright.config.js \
            e2e/06-concurrency.spec.js \
            e2e/07-persistence.spec.js \
            e2e/08-dashboard-sync.spec.js \
            e2e/09-mixbug.spec.js \
            e2e/10-logic-usability.spec.js

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: painel-cfo-playwright-report
          path: painel-cfo/tests/playwright-report
          if-no-files-found: ignore
