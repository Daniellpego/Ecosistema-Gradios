<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=630">
  <title>OG Image - BG Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #050D1A 0%, #0A1628 40%, #131F35 100%);
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .orb-1 {
      position: absolute;
      top: -120px;
      right: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0,168,255,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .orb-2 {
      position: absolute;
      bottom: -100px;
      left: -60px;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(0,200,240,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 0 80px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 40px;
    }
    .logo-text {
      font-size: 48px;
      font-weight: 800;
      color: #FFFFFF;
    }
    .logo-text span {
      color: #00A8FF;
    }
    h1 {
      font-size: 52px;
      font-weight: 800;
      color: #F0F4F8;
      line-height: 1.2;
      margin-bottom: 24px;
    }
    h1 span {
      background: linear-gradient(90deg, #00A8FF, #00C8F0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 22px;
      color: #94A3B8;
      max-width: 800px;
      margin: 0 auto;
      line-height: 1.5;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,168,255,0.1);
      border: 1px solid rgba(0,168,255,0.25);
      border-radius: 100px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      color: #00C8F0;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #00C8F0;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="orb-1"></div>
  <div class="orb-2"></div>
  <div class="content">
    <div class="logo-row">
      <span class="logo-text">BG <span>TECH</span></span>
    </div>
    <div class="badge">
      <span class="dot"></span>
      47+ EMPRESAS OTIMIZADAS
    </div>
    <h1>Automação e <span>Engenharia Digital</span><br>para Empresas B2B</h1>
    <p>Diagnóstico gratuito em 3 minutos. Descubra quanto sua operação perde por mês e o que automatizar primeiro.</p>
  </div>
</body>
</html>
