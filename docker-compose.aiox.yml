version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: aiox-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  n8n:
    image: n8nio/n8n:latest
    container_name: aiox-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=gradios
      - N8N_BASIC_AUTH_PASSWORD=gradios2026
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=America/Sao_Paulo
    volumes:
      - E:/gradios/aiox/n8n-data:/home/node/.n8n
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    container_name: aiox-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=evolution
    volumes:
      - E:/gradios/aiox/postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: aiox-evolution
    ports:
      - "8080:8080"
    env_file:
      - ./aiox/evolution.env
    volumes:
      - E:/gradios/aiox/evolution-data:/evolution/store
      - E:/gradios/aiox/evolution.env:/evolution/.env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
